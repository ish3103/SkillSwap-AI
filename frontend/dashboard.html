<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav>
        <h1>SkillSwap Dashboard</h1>
        <div>
            <a href="browse.html" class="browse-btn">
                Browse Skills
            </a>

            <a href="requests.html" class="browse-btn">
                Requests
            </a>

            <button onclick="logout()">Logout</button>
        </div>
    </nav>

    <div class="dashboard">

        <h2 id="welcomeText"></h2>

        <div class="skill-section">

            <h3>Skills You Offer</h3>

            <input type="text" id="offerSkill" placeholder="Add Offered Skill">

            <button onclick="addOfferSkill()">Add Skill</button>

            <ul id="offerList"></ul>

        </div>

        <div class="skill-section">

            <h3>Skills You Want</h3>

            <input type="text" id="wantSkill" placeholder="Add Wanted Skill">

            <button onclick="addWantSkill()">Add Skill</button>

            <ul id="wantList"></ul>

        </div>

    </div>

<script src="script.js"></script>
</body>
</html>
